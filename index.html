function renderCheckIn() {
  document.getElementById('topbar-title').textContent = 'Check In';
  document.getElementById('topbar-actions').innerHTML = '';

  document.getElementById('page-content').innerHTML = `
    <div class="code-entry-wrap">
      <div class="card" style="text-align:center;margin-bottom:20px">
        <div style="font-size:36px;margin-bottom:8px">📋</div>
        <div style="font-family:var(--font-display);font-size:28px;letter-spacing:.5px">Enter Session Code</div>
        <p class="text-gray" style="margin-top:8px;font-size:14px">Ask your teacher for the code and enter it below to mark your attendance.</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">6-Character Code</label>
          <input type="text" id="checkin-code" class="code-input" maxlength="6" placeholder="XXXXXX"
            oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter') submitCheckIn()" />
        </div>
        <button class="btn btn-primary w-full btn-lg" onclick="submitCheckIn()">Mark Me Present →</button>
      </div>
      <div id="checkin-result" style="margin-top:16px"></div>
    </div>`;
}

function submitCheckIn() {
  const raw    = document.getElementById('checkin-code').value.trim().toUpperCase();
  const result = document.getElementById('checkin-result');

  if (raw.length < 6) { showToast('⚠️ Please enter a 6-character code'); return; }

  const sessions = DB.get('sessions');
  const sIdx     = sessions.findIndex(s => s.code === raw);

  if (sIdx === -1) {
    result.innerHTML = `<div class="card" style="border-color:#e53e3e;background:#fff5f5;text-align:center">
      <div style="font-size:32px">❌</div>
      <div style="font-weight:700;margin-top:8px">Invalid Code</div>
      <p class="text-gray text-sm mt-2">Double-check the code with your teacher.</p>
    </div>`;
    return;
  }

  const session = sessions[sIdx];

  // Check student is enrolled in this course
  const enrollment = DB.get('enrollments').find(e => e.studentId === currentUser.id && e.courseId === session.courseId);
  if (!enrollment) {
    result.innerHTML = `<div class="card" style="border-color:#e53e3e;background:#fff5f5;text-align:center">
      <div style="font-size:32px">⛔</div>
      <div style="font-weight:700;margin-top:8px">Not Enrolled</div>
      <p class="text-gray text-sm mt-2">You are not enrolled in the course this session belongs to.</p>
    </div>`;
    return;
  }

  if (session.attendees.includes(currentUser.id)) {
    const course = DB.get('courses').find(c => c.id === session.courseId);
    result.innerHTML = `<div class="card" style="border-color:var(--orange);background:var(--orange-light);text-align:center">
      <div style="font-size:32px">ℹ️</div>
      <div style="font-weight:700;margin-top:8px">Already Checked In</div>
      <p class="text-gray text-sm mt-2">You already marked attendance for <strong>${session.label}</strong> in ${course ? course.title : 'this course'}.</p>
    </div>`;
    return;
  }

  // Mark present
  sessions[sIdx].attendees.push(currentUser.id);
  DB.set('sessions', sessions);

  const course    = DB.get('courses').find(c => c.id === session.courseId);
  const att       = getStudentAttendance(currentUser.id, session.courseId);
  const certIssued = maybeIssueCertificate(currentUser.id, session.courseId);

  document.getElementById('checkin-code').value = '';
  result.innerHTML = `<div class="card" style="border-color:#25a244;background:#e6f7ee;text-align:center">
    <div style="font-size:40px">${certIssued ? '🏆' : '✅'}</div>
    <div style="font-family:var(--font-display);font-size:28px;letter-spacing:.5px;margin-top:8px">${certIssued ? 'Attendance Marked + Certificate Earned!' : 'Attendance Marked!'}</div>
    <p style="color:var(--gray-600);font-size:14px;margin-top:6px"><strong>${session.label}</strong> · ${course ? course.title : ''}</p>
    <p style="color:var(--gray-600);font-size:14px">${formatDate(session.date)}</p>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #b7e4c7">
      <div style="font-size:12px;color:var(--gray-600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Your Attendance Rate</div>
      <div style="font-family:var(--font-display);font-size:40px;color:#25a244">${att.pct}%</div>
      <div style="font-size:13px;color:var(--gray-600)">${att.attended} of ${att.total} sessions attended</div>
    </div>
    ${certIssued ? `<div style="margin-top:16px">
      <button class="cert-badge" onclick="openCertificate('${currentUser.id}','${session.courseId}')">🎓 View &amp; Print Certificate</button>
    </div>` : ''}
    <button class="btn btn-secondary" style="margin-top:16px" onclick="navigate('attendance')">View My Attendance →</button>
  </div>`;
  showToast(certIssued ? '🏆 Certificate earned!' : '✅ Attendance recorded!');
}

            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
              <div>
                <div class="card-title">${course.title}</div>
                <div class="text-gray text-sm">Required: ${threshold}% attendance</div>
              </div>
              <div style="text-align:right">
                <div class="att-pct ${attClass(att.pct)}" style="font-size:32px;font-family:var(--font-display)">${att.pct}%</div>
                <div class="text-gray text-sm">${att.attended}/${att.total} sessions</div>
              </div>
            </div>
            <div class="progress-bar" style="height:10px;margin-bottom:6px"><div class="progress-fill" style="width:${att.pct}%"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-600);margin-bottom:16px">
              <span>0%</span>
              <span style="color:var(--orange)">Threshold: ${threshold}%</span>
              <span>100%</span>
            </div>
            ${att.pct < threshold && att.total > 0 ? `
            <div style="background:#fff5f5;border:1.5px solid #e53e3e;border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;color:#e53e3e">
              ⚠️ Your attendance is below the required threshold. You need to attend more sessions to qualify for completion.
            </div>` : att.pct >= threshold && att.total > 0 ? `
            <div style="background:#e6f7ee;border:1.5px solid #25a244;border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;color:#25a244">
              ✓ Great — you're meeting the attendance requirement!
            </div>` : ''}
            ${cSessions.length === 0 ? `<p class="text-gray text-sm">No sessions scheduled yet.</p>` : `
            <table>
              <thead><tr><th>Date</th><th>Session</th><th>Status</th></tr></thead>
              <tbody>${cSessions.map(s => {
                const present = s.attendees.includes(currentUser.id);
                return `<tr>
                  <td>${formatDate(s.date)}</td>
                  <td>${s.label}</td>
                  <td>${present ? `<span class="badge badge-green">✓ Present</span>` : `<span class="badge badge-gray">Absent</span>`}</td>
                </tr>`;
              }).join('')}</tbody>
            </table>`}
          </div>`;
        }).join('')}`;
  }
}

function renderLessonView({ courseId, lessonId }) {
  const course      = DB.get('courses').find(c => c.id === courseId);
  if (!course) return;
  const lessonIndex = lessonId ? course.lessons.findIndex(l => l.id === lessonId) : 0;
  const lesson      = course.lessons[lessonIndex];
  if (!lesson) return;

  document.getElementById('topbar-title').textContent = course.title;
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('course-detail',{courseId:'${courseId}'})">← Back to Course</button>`;

  const enrollments = DB.get('enrollments');
  const eIdx        = enrollments.findIndex(e => e.studentId === currentUser.id && e.courseId === courseId);
  if (eIdx > -1 && !enrollments[eIdx].completedLessons.includes(lesson.id)) {
    enrollments[eIdx].completedLessons.push(lesson.id);
    DB.set('enrollments', enrollments);
  }

  const prev       = lessonIndex > 0 ? course.lessons[lessonIndex - 1] : null;
  const next       = lessonIndex < course.lessons.length - 1 ? course.lessons[lessonIndex + 1] : null;
  const enrollment = DB.get('enrollments').find(e => e.studentId === currentUser.id && e.courseId === courseId);
  const allDone    = course.lessons.every(l => enrollment && enrollment.completedLessons.includes(l.id));

  document.getElementById('page-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start">
      <div>
        <div class="lesson-viewer">
          <div class="flex items-center gap-2 mt-0" style="margin-bottom:8px">
            <span class="badge ${lesson.type==='video'?'badge-black':'badge-orange'}">${lesson.type==='video'?'🎬 Video':'📄 Text'}</span>
            <span class="text-sm text-gray">Lesson ${lessonIndex+1} of ${course.lessons.length}</span>
          </div>
          <h2>${lesson.title}</h2>
          ${lesson.type === 'video' ? `
            <div class="video-embed">
              ${lesson.videoUrl ? `<iframe src="${lesson.videoUrl}" allowfullscreen></iframe>` : `<div class="video-placeholder"><span class="play-icon">▶</span><p>No video URL</p></div>`}
            </div>
            ${lesson.content ? `<div class="lesson-text-content" style="margin-top:16px">${lesson.content}</div>` : ''}
          ` : `<div class="lesson-text-content">${formatContent(lesson.content)}</div>`}
          <div class="lesson-nav">
            ${prev ? `<button class="btn btn-ghost" onclick="navigate('lesson-view',{courseId:'${courseId}',lessonId:'${prev.id}'})">← ${prev.title}</button>` : '<div></div>'}
            ${next
              ? `<button class="btn btn-primary" onclick="navigate('lesson-view',{courseId:'${courseId}',lessonId:'${next.id}'})">Next: ${next.title} →</button>`
              : course.exam && allDone
                ? `<button class="btn btn-primary" onclick="navigate('exam-view',{courseId:'${courseId}'})">Take Exam →</button>`
                : `<span class="badge badge-green">✓ Course Complete</span>`}
          </div>
        </div>
      </div>
      <div>
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:16px 18px;border-bottom:1.5px solid var(--gray-200)"><strong style="font-size:14px">Course Contents</strong></div>
          <div class="lesson-list" style="border:none;border-radius:0">
            ${course.lessons.map((l, i) => `
              <div class="lesson-item ${l.id === lesson.id ? 'active' : ''}" onclick="navigate('lesson-view',{courseId:'${courseId}',lessonId:'${l.id}'})">
                <div class="lesson-num">${enrollment && enrollment.completedLessons.includes(l.id) ? '✓' : i+1}</div>
                <div class="lesson-item-info">
                  <div class="lesson-item-title">${l.title}</div>
                  <div class="lesson-item-type">${l.type==='video'?'🎬 Video':'📄 Text'}</div>
                </div>
              </div>`).join('')}
            ${course.exam ? `
              <div class="lesson-item" onclick="${allDone ? `navigate('exam-view',{courseId:'${courseId}'})` : ''}">
                <div class="lesson-num" style="background:var(--orange);color:white">✍</div>
                <div class="lesson-item-info">
                  <div class="lesson-item-title">${course.exam.title}</div>
                  <div class="lesson-item-type">${allDone ? 'Ready to take' : 'Complete all lessons first'}</div>

}

function formatContent(text) {
  if (!text) return '<p class="text-gray">No content provided.</p>';
  return text.split('\n').map(line => {
    if (line.startsWith('```') || line.endsWith('```')) return '';
    if (line.trim() === '') return '<br>';
    return `<p style="margin-bottom:10px">${line
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;font-family:monospace">$1</code>')
    }</p>`;
  }).join('');
}

let examAnswers   = {};
let examSubmitted = false;

function renderExamView({ courseId }) {
  const course  = DB.get('courses').find(c => c.id === courseId);
  if (!course || !course.exam) { navigate('my-courses'); return; }
  const existing = DB.get('exam_results').find(r => r.studentId === currentUser.id && r.courseId === courseId);
  if (existing) { showExamResult(course, existing); return; }

  examAnswers   = {};
  examSubmitted = false;
  document.getElementById('topbar-title').textContent = 'Exam';
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('course-detail',{courseId:'${courseId}'})">← Back</button>`;

  const exam = course.exam;
  document.getElementById('page-content').innerHTML = `
    <div class="exam-wrap">
      <div class="exam-header">
        <div>
          <div class="exam-title">${exam.title}</div>
          <div class="exam-meta">${exam.questions.length} questions · ${course.title}</div>
        </div>
        <div class="exam-progress">
          <div class="exam-progress-val" id="exam-progress-val">0</div>
          <div class="exam-progress-label">answered</div>
        </div>
      </div>
      <div id="exam-questions">
        ${exam.questions.map((q, qi) => `
          <div class="question-card" id="qcard-${qi}">
            <div class="question-num">Question ${qi+1} of ${exam.questions.length}</div>
            <div class="question-text">${q.text || '(No question text)'}</div>
            ${q.type === 'mcq' ? `<div class="option-list">${q.options.map((opt, oi) => `
              <div class="option-item" id="opt-${qi}-${oi}" onclick="selectOption(${qi},${oi},'${courseId}')">
                <div class="option-radio" id="radio-${qi}-${oi}"></div>
                <span>${opt}</span>
              </div>`).join('')}</div>`
            : `<textarea class="open-answer" placeholder="Type your answer here..." oninput="updateOpenAnswer(${qi},this.value,'${courseId}')"></textarea>`}
          </div>`).join('')}
      </div>
      <div style="text-align:center;padding:20px 0">
        <button class="btn btn-primary btn-lg" onclick="submitExam('${courseId}')">Submit Exam →</button>
        <p class="text-sm text-gray mt-2">Answer all questions before submitting.</p>
      </div>
    </div>`;
}

function selectOption(qi, oi, courseId) {
  const exam = DB.get('courses').find(c => c.id === courseId).exam;
  exam.questions[qi].options.forEach((_, i) => {
    const el = document.getElementById(`opt-${qi}-${i}`);
    if (el) el.classList.remove('selected');
  });
  const sel = document.getElementById(`opt-${qi}-${oi}`);
  if (sel) sel.classList.add('selected');
  examAnswers[qi] = oi;
  updateExamProgress(exam.questions.length);
}
function updateOpenAnswer(qi, val, courseId) {
  examAnswers[qi] = val;
  const exam = DB.get('courses').find(c => c.id === courseId).exam;
  updateExamProgress(exam.questions.length);
}
function updateExamProgress(total) {
  const el = document.getElementById('exam-progress-val');
  if (el) el.textContent = Object.keys(examAnswers).length;
}
function submitExam(courseId) {
  const course = DB.get('courses').find(c => c.id === courseId);
  const exam   = course.exam;
  const mcqQs  = exam.questions.filter(q => q.type === 'mcq');
  const unanswered = mcqQs.filter(q => examAnswers[exam.questions.indexOf(q)] === undefined);
  if (unanswered.length > 0) { showToast('⚠️ Answer all multiple choice questions'); return; }

  let correct = 0;
  exam.questions.forEach((q, qi) => { if (q.type === 'mcq' && examAnswers[qi] === q.correct) correct++; });
  const mcqCount = mcqQs.length;
  const score    = mcqCount > 0 ? Math.round((correct / mcqCount) * 100) : 100;

  const result = { id: uid(), studentId: currentUser.id, courseId, score, correct, total: mcqCount, answers: examAnswers, submittedAt: Date.now() };
  const results = DB.get('exam_results');
  results.push(result);
  DB.set('exam_results', results);
  const certIssued = maybeIssueCertificate(currentUser.id, courseId);
  showExamResult(course, result, certIssued);
}

function showExamResult(course, result, certIssued = false) {
  document.getElementById('topbar-title').textContent = 'Exam Result';
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('course-detail',{courseId:'${course.id}'})">← Back to Course</button>`;

  const passed = result.score >= 60;
  // Check cert even if not freshly issued (re-viewing result)
  const hasCert = certIssued || !!DB.get('certificates').find(c => c.studentId === currentUser.id && c.courseId === course.id);

  document.getElementById('page-content').innerHTML = `
    <div class="exam-wrap">
      <div class="exam-result">
        <div style="font-size:48px;margin-bottom:8px">${hasCert ? '🏆' : passed ? '🎉' : '📚'}</div>
        <div class="result-score">${result.score}%</div>
        <div class="result-label">${result.correct} / ${result.total} MCQ correct</div>
        <div class="result-message">${hasCert ? 'You\'ve earned your certificate!' : passed ? 'Congratulations, you passed!' : 'Keep studying and try again!'}</div>
        ${hasCert ? `
        <div style="margin-top:16px">
          <button class="cert-badge" onclick="openCertificate('${currentUser.id}','${course.id}')">
            🎓 View &amp; Print Certificate
          </button>
        </div>` : ''}
        <div style="margin-top:28px;display:flex;gap:12px;justify-content:center">
          <button class="btn btn-secondary" onclick="navigate('course-detail',{courseId:'${course.id}'})">← Back to Course</button>
          <button class="btn btn-primary" onclick="navigate('my-courses')">My Courses</button>
        </div>
      </div>
      <div style="margin-top:28px">
        <div class="section-title" style="margin-bottom:16px">Review</div>
        ${course.exam.questions.map((q, qi) => {
          const userAns  = result.answers[qi];
          return `<div class="question-card">
            <div class="question-num">Q${qi+1} — ${q.type === 'mcq' ? 'Multiple Choice' : 'Open Answer'}</div>
            <div class="question-text">${q.text}</div>
            ${q.type === 'mcq' ? `<div class="option-list">${q.options.map((opt, oi) => {
              let cls = '';
              if (oi === q.correct) cls = 'correct';
              else if (oi === userAns && userAns !== q.correct) cls = 'wrong';
              return `<div class="option-item ${cls}" style="cursor:default">
                <div class="option-radio" ${oi === userAns ? 'style="border-color:var(--orange);background:var(--orange)"' : ''}></div>
                <span>${opt}</span>
                ${oi === q.correct ? `<span style="margin-left:auto;color:#25a244;font-size:13px;font-weight:600">✓ Correct</span>` : ''}
              </div>`;
            }).join('')}</div>` :
            `<div style="background:var(--gray-100);border-radius:6px;padding:12px;font-size:14px;color:var(--gray-600)">
              <strong style="color:var(--black)">Your answer:</strong><br>${userAns || '<em>No answer provided</em>'}
              <br><span class="badge badge-gray" style="margin-top:8px">Reviewed by instructor</span>
            </div>`}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

/* Check if a student has met all completion requirements for a course.
   Online  : all lessons visited + exam score ≥ 60
   Onsite  : attendance % ≥ threshold + exam score ≥ 60          */
function checkCourseCompletion(studentId, courseId) {
  const course     = DB.get('courses').find(c => c.id === courseId);
  const student    = DB.get('users').find(u => u.id === studentId);
  const result     = DB.get('exam_results').find(r => r.studentId === studentId && r.courseId === courseId);
  const enrollment = DB.get('enrollments').find(e => e.studentId === studentId && e.courseId === courseId);
  if (!course || !student || !result || !enrollment) return false;
  if (result.score < 60) return false;

  if (student.type === 'online') {
    return course.lessons.every(l => enrollment.completedLessons.includes(l.id));
  }
  if (student.type === 'onsite') {
    const att       = getStudentAttendance(studentId, courseId);
    const threshold = course.attendanceThreshold || 75;
    return att.pct >= threshold;
  }
  return false;
}

/* Called after exam submission and after attendance check-in.
   Creates a certificate record if one doesn't exist yet.        */
function maybeIssueCertificate(studentId, courseId) {
  if (!checkCourseCompletion(studentId, courseId)) return false;
  const existing = DB.get('certificates').find(c => c.studentId === studentId && c.courseId === courseId);
  if (existing) return true; // already issued
  const certs = DB.get('certificates');
  certs.push({
    id:        'CERT-' + uid().toUpperCase().slice(0, 8),
    studentId, courseId,
    issuedAt:  Date.now()
  });
  DB.set('certificates', certs);
  return true;
}

/* ── Reports index — card per student ── */
function renderReports() {
  document.getElementById('topbar-title').textContent = 'Student Reports';
  document.getElementById('topbar-actions').innerHTML = '';

  const students    = DB.get('users').filter(u => u.role === 'student');
  const courses     = DB.get('courses');
  const enrollments = DB.get('enrollments');
  const results     = DB.get('exam_results');
  const certs       = DB.get('certificates');

  if (students.length === 0) {
    document.getElementById('page-content').innerHTML = `<div class="empty-state"><span class="empty-icon">📈</span><h3>No students yet</h3><p>Add students to view reports.</p></div>`;
    return;
  }

  // Build summary per student
  const summaries = students.map(s => {
    const sEnroll  = enrollments.filter(e => e.studentId === s.id);
    const sResults = results.filter(r => r.studentId === s.id);
    const sCerts   = certs.filter(c => c.studentId === s.id);

    // Avg exam score
    const avgScore = sResults.length
      ? Math.round(sResults.reduce((a, r) => a + r.score, 0) / sResults.length)
      : null;

    // Avg attendance (onsite only)
    let avgAtt = null;
    if (s.type === 'onsite' && sEnroll.length > 0) {
      const atts = sEnroll.map(e => getStudentAttendance(s.id, e.courseId).pct);
      avgAtt = Math.round(atts.reduce((a, v) => a + v, 0) / atts.length);
    }

    // Lesson completion % (online)
    let lessonPct = null;
    if (s.type === 'online' && sEnroll.length > 0) {
      const pcts = sEnroll.map(e => {
        const c = courses.find(x => x.id === e.courseId);
        if (!c || c.lessons.length === 0) return 0;
        return Math.round((e.completedLessons.length / c.lessons.length) * 100);
      });
      lessonPct = Math.round(pcts.reduce((a, v) => a + v, 0) / pcts.length);
    }

    // At-risk flags
    const risks = [];
    if (avgScore !== null && avgScore < 60) risks.push('Low exam score');
    if (avgAtt !== null) {
      const minThresh = Math.min(...sEnroll.map(e => {
        const c = courses.find(x => x.id === e.courseId);
        return c ? (c.attendanceThreshold || 75) : 75;
      }));
      if (avgAtt < minThresh) risks.push('Below attendance threshold');
    }

    return { student: s, sEnroll, sResults, sCerts, avgScore, avgAtt, lessonPct, risks };
  });

  // Sort: at-risk first, then alphabetical
  summaries.sort((a, b) => b.risks.length - a.risks.length || a.student.name.localeCompare(b.student.name));

  const atRiskCount = summaries.filter(s => s.risks.length > 0).length;

  document.getElementById('page-content').innerHTML = `
    <div class="stats-grid" style="margin-bottom:24px">
      <div class="stat-card accent">
        <div class="stat-label">Total Students</div>
        <div class="stat-value">${students.length}</div>
        <div class="stat-sub">In the system</div>
      </div>
      <div class="stat-card ${atRiskCount > 0 ? 'accent' : ''}">
        <div class="stat-label">At Risk</div>
        <div class="stat-value" style="${atRiskCount > 0 ? '' : 'color:var(--gray-400)'}">${atRiskCount}</div>
        <div class="stat-sub">Need attention</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Certificates Issued</div>
        <div class="stat-value">${certs.length}</div>
        <div class="stat-sub">Completions</div>
      </div>
    </div>
    <div class="courses-grid">
      ${summaries.map(s => `
        <div class="report-student-card" onclick="navigate('student-report',{studentId:'${s.student.id}'})">
          <div class="report-header-strip" style="${s.risks.length > 0 ? 'background:#e53e3e' : ''}"></div>
          <div class="report-student-body">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div class="report-student-name">${s.student.name}</div>
                <div class="report-student-email">${s.student.email}</div>
              </div>
              <span class="type-pill type-${s.student.type}">${s.student.type === 'online' ? '💻' : '🏫'} ${s.student.type}</span>
            </div>
            <div class="report-kpi-row">
              <div class="report-kpi">
                <div class="report-kpi-val">${s.sEnroll.length}</div>
                <div class="report-kpi-label">Courses</div>
              </div>
              <div class="report-kpi">
                <div class="report-kpi-val" style="${s.avgScore !== null && s.avgScore < 60 ? 'color:#e53e3e' : ''}">${s.avgScore !== null ? s.avgScore + '%' : '—'}</div>
                <div class="report-kpi-label">Avg Score</div>
              </div>
              <div class="report-kpi">
                <div class="report-kpi-val" style="${s.student.type === 'onsite' && s.avgAtt !== null ? `color:${s.avgAtt < 75 ? '#e53e3e' : '#25a244'}` : ''}">
                  ${s.student.type === 'onsite' ? (s.avgAtt !== null ? s.avgAtt + '%' : '—') : (s.lessonPct !== null ? s.lessonPct + '%' : '—')}
                </div>
                <div class="report-kpi-label">${s.student.type === 'onsite' ? 'Attendance' : 'Lessons'}</div>
              </div>
              <div class="report-kpi">
                <div class="report-kpi-val" style="${s.sCerts.length > 0 ? 'color:#25a244' : ''}">${s.sCerts.length > 0 ? '✓' : '—'}</div>
                <div class="report-kpi-label">Cert</div>
              </div>
            </div>
            ${s.risks.length > 0 ? `<div class="risk-flag">⚠ ${s.risks.join(' · ')}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>`;
}

/* Save a teacher's open-answer grade to localStorage */
function saveOpenGrade(resultId, questionIdx, grade) {
  const grades = DB.getObj('open_grades', {});
  const key    = resultId + '_' + questionIdx;
  if (grade) grades[key] = grade;
  else delete grades[key];
  DB.setObj('open_grades', grades);
  showToast(grade ? `✅ Graded: ${grade}` : '🗑️ Grade cleared');
}

/* Printable HTML report — opens in new tab */
function openPrintableReport(studentId) {
  const student     = DB.get('users').find(u => u.id === studentId);
  const courses     = DB.get('courses');
  const enrollments = DB.get('enrollments').filter(e => e.studentId === studentId);
  const results     = DB.get('exam_results').filter(r => r.studentId === studentId);
  const certs       = DB.get('certificates').filter(c => c.studentId === studentId);
  const grades      = DB.getObj('open_grades', {});
  if (!student) return;

  const enrolled = enrollments.map(e => {
    const c       = courses.find(x => x.id === e.courseId);
    if (!c) return null;
    const result    = results.find(r => r.courseId === e.courseId);
    const att       = student.type === 'onsite' ? getStudentAttendance(studentId, e.courseId) : null;
    const cert      = certs.find(x => x.courseId === e.courseId);
    const lessonPct = c.lessons.length > 0 ? Math.round((e.completedLessons.length / c.lessons.length) * 100) : 0;
    return { course: c, enrollment: e, result, att, cert, lessonPct };
  }).filter(Boolean);

  const issued = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const courseRows = enrolled.map(e => {
    const score = e.result ? e.result.score + '%' : 'Not taken';
    const prog  = student.type === 'online'
      ? `${e.enrollment.completedLessons.length}/${e.course.lessons.length} lessons (${e.lessonPct}%)`
      : e.att ? `${e.att.attended}/${e.att.total} sessions (${e.att.pct}%)` : '—';
    const certStr = e.cert ? '✓ Issued' : '—';
    const status  = e.cert ? 'Complete' : (e.result && e.result.score >= 60 ? 'Exam Passed' : 'In Progress');
    return `<tr>
      <td>${e.course.title}</td>
      <td>${prog}</td>
      <td style="font-weight:600;color:${e.result ? (e.result.score >= 60 ? '#1a7a3c' : '#c53030') : '#555'}">${score}</td>
      <td>${certStr}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');

  // Open answers for print
  const openAnswerRows = enrolled.flatMap(e => {
    if (!e.result || !e.course.exam) return [];
    return e.course.exam.questions.filter(q => q.type === 'open').map((q, qi) => {
      const realIdx = e.course.exam.questions.indexOf(q);
      const ans     = e.result.answers[realIdx] || 'No answer provided';
      const grade   = grades[e.result.id + '_' + realIdx] || 'Not graded';
      return `<div style="margin-bottom:14px;padding:14px;border:1px solid #e8e8e8;border-radius:4px;border-left:4px solid #FF6B00">
        <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#a0a0a0;margin-bottom:4px">${e.course.title}</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">${q.text}</div>
        <div style="font-size:14px;color:#555;font-style:italic;margin-bottom:8px">${ans}</div>
        <div style="font-size:12px">Grade: <strong>${grade}</strong></div>
      </div>`;
    });
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Progress Report — ${student.name}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;color:#0a0a0a;background:#fff;padding:32px 40px;max-width:860px;margin:0 auto;font-size:14px;line-height:1.6;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:#0a0a0a;}
  h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.5px;margin:28px 0 10px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#0a0a0a;margin-bottom:20px;}
  .logo span{color:#FF6B00;}
  .header{border-bottom:3px solid #FF6B00;padding-bottom:16px;margin-bottom:24px;}
  .meta-row{display:flex;gap:24px;font-size:13px;color:#555;margin-top:8px;}
  .meta-row strong{color:#0a0a0a;}
  .kpi-row{display:flex;gap:16px;margin:20px 0;}
  .kpi{flex:1;background:#f5f5f5;border-radius:4px;padding:12px;text-align:center;}
  .kpi-val{font-family:'Bebas Neue',sans-serif;font-size:32px;}
  .kpi-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#a0a0a0;}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;}
  th{padding:8px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#555;border-bottom:2px solid #e8e8e8;}
  td{padding:10px 12px;font-size:14px;border-bottom:1px solid #e8e8e8;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;}
  .badge-orange{background:#fff3ea;color:#FF6B00;}
  footer{margin-top:40px;padding-top:16px;border-top:1px solid #e8e8e8;font-size:11px;color:#a0a0a0;display:flex;justify-content:space-between;}
  @media print{body{padding:20px;} .no-print{display:none;}}
</style>
</head>
<body>
  <div class="logo">LEARN<span>FORGE</span></div>
  <div class="header">
    <h1>Student Progress Report</h1>
    <div class="meta-row">
      <span><strong>Student:</strong> ${student.name}</span>
      <span><strong>Email:</strong> ${student.email}</span>
      <span><strong>Track:</strong> ${student.type === 'online' ? 'Online' : 'On-site'}</span>
      <span><strong>Generated:</strong> ${issued}</span>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-val">${enrolled.length}</div><div class="kpi-label">Courses Enrolled</div></div>
    <div class="kpi"><div class="kpi-val">${results.length}</div><div class="kpi-label">Exams Taken</div></div>
    <div class="kpi"><div class="kpi-val" style="color:${results.length && Math.round(results.reduce((a,r)=>a+r.score,0)/results.length) < 60 ? '#c53030' : '#1a7a3c'}">${results.length ? Math.round(results.reduce((a,r)=>a+r.score,0)/results.length)+'%' : '—'}</div><div class="kpi-label">Avg Score</div></div>
    <div class="kpi"><div class="kpi-val" style="color:${certs.length > 0 ? '#1a7a3c' : '#a0a0a0'}">${certs.length}</div><div class="kpi-label">Certificates</div></div>
  </div>

  <h2>Course Summary</h2>
  <table>
    <thead><tr><th>Course</th><th>${student.type === 'online' ? 'Progress' : 'Attendance'}</th><th>Exam Score</th><th>Certificate</th><th>Status</th></tr></thead>
    <tbody>${courseRows}</tbody>
  </table>

  ${openAnswerRows ? `<h2>Open Answer Responses</h2>${openAnswerRows}` : ''}

  <footer>
    <span>LearnForge · Confidential Student Report</span>
    <span>Generated ${issued}</span>
  </footer>

  <div class="no-print" style="position:fixed;bottom:20px;right:20px">
    <button onclick="window.print()" style="padding:10px 24px;background:#FF6B00;color:#fff;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">
      🖨️ Print / Save PDF
    </button>
  </div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

</body>
</html>
